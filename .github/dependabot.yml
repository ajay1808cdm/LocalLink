version: 2
updates:
  # Maintain dependencies for npm in backend-node
  - package-ecosystem: "npm"
    directory: "/locallink/backend-node"
    schedule:
      interval: "weekly"
    
  # Maintain dependencies for npm in frontend
  - package-ecosystem: "npm"
    directory: "/locallink/frontend"
    schedule:
      interval: "weekly"

  # Maintain dependencies for npm in automation-framework
  - package-ecosystem: "npm"
    directory: "/locallink/automation-framework"
    schedule:
      interval: "weekly"
      
  # Maintain dependencies for pip in backend
  - package-ecosystem: "pip"
    directory: "/locallink/backend"
    schedule:
      interval: "weekly"

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
