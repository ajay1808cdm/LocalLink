name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: locallink/frontend
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    - name: Install dependencies
      run: npm install
    - name: Build React App
      run: npm run build

  build-backend-node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: locallink/backend-node
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    - name: Install dependencies
      run: npm install
    - name: Check syntax
      run: node -c server.js

  build-backend-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: locallink/backend
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Check syntax
      run: python -m py_compile app.py

  e2e-selenium-test:
    runs-on: ubuntu-latest
    needs: [build-frontend]
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    - name: Install frontend dependencies
      working-directory: locallink/frontend
      run: npm install
    - name: Build frontend
      working-directory: locallink/frontend
      run: npm run build
    - name: Serve frontend in background
      working-directory: locallink/frontend
      run: |
        npx serve -s build -l 3000 &
        npx wait-on http://localhost:3000
    - name: Set up Python for Selenium
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install Selenium and OpenPyXL
      run: pip install selenium openpyxl
    - name: Run Selenium E2E Tests
      working-directory: locallink
      run: python e2e_tests/test_website.py
    - name: Upload Test Results Artifact
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: e2e-test-results
        path: locallink/results/test_results.xlsx

  e2e-appium-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    - name: Install dependencies
      working-directory: locallink/automation-framework
      run: npm install
    - name: Run Appium Tests
      working-directory: locallink/automation-framework
      run: npm run test:mobile
