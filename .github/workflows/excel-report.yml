name: Generate Excel Test Report

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pytest

      - name: Execute Project Tests (Placeholder)
        run: |
          echo "Running project tests..."
          # Replace with your actual test commands, e.g., 
          # pytest locallink/backend/tests/
          # npm test --prefix locallink/frontend/
          echo "All tests passed successfully!"

      - name: Generate Excel Test Report
        run: |
          echo "Executing Python script to build Excel report..."
          python .github/scripts/generate_excel_report.py

      - name: Upload Excel Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalLink-Test-Report
          path: reports/LocalLink_Test_Report.xlsx
          retention-days: 30
