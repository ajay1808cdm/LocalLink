name: Load Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  load-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: locallink/backend-node

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: locallink_user
          POSTGRES_PASSWORD: locallink_password
          POSTGRES_DB: locallink
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v7

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: locallink/backend-node/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Set environment variables
      run: |
        echo "PORT=5000" >> $GITHUB_ENV
        echo "DB_HOST=localhost" >> $GITHUB_ENV
        echo "DB_PORT=5432" >> $GITHUB_ENV
        echo "DB_USER=locallink_user" >> $GITHUB_ENV
        echo "DB_PASSWORD=locallink_password" >> $GITHUB_ENV
        echo "DB_NAME=locallink" >> $GITHUB_ENV
        echo "JWT_SECRET=test_secret_for_ci" >> $GITHUB_ENV

    - name: Initialize Database (Seed)
      run: npm run seed

    - name: Start backend server in background
      run: |
        npm start &
        # Wait for the server to be ready
        npx wait-on http://localhost:5000/api/health
      
    - name: Run Artillery Load Test
      run: npm run test:load

    - name: Upload Artillery Report
      uses: actions/upload-artifact@v4
      with:
        name: loadtest-report
        path: locallink/backend-node/reports/loadtest-report.json
