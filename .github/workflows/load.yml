name: Load Tests CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: locallink/automation-framework/package-lock.json

    - name: Install dependencies
      working-directory: locallink/automation-framework
      run: npm install

    - name: Run Load Tests
      working-directory: locallink/automation-framework
      run: npm run test:load
